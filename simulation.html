<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Simulation</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            user-select: none;
        }
        
        /* 3D Container */
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* Let pointer events pass through to canvas if needed */
        }

        /* Camera Feed PIP */
        .video-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        video {
            display: none;
        }
        canvas.output_canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror view for natural interaction */
            object-fit: cover;
        }

        /* Text Output Area */
        #text-output-container {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        #text-output {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: #00ffcc;
            font-size: 32px;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            resize: none;
            outline: none;
            text-align: center;
        }
        #text-output::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Virtual Hand Keyboard */
        #keyboard {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            background: rgba(10, 10, 20, 0.6);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .key-row {
            display: flex;
            gap: 12px;
        }
        .key {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .key::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .key.hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
            border-color: rgba(0, 255, 204, 0.5);
        }
        .key.active {
            background: #00ffcc;
            color: #000;
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.8);
            font-weight: 700;
        }
        .key.space { width: 400px; }
        .key.backspace { width: 120px; font-size: 18px; }

        /* Hand Cursor */
        #cursor {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #00ffcc;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.2s;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            pointer-events: none;
        }
        #cursor::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px solid rgba(0, 255, 204, 0.5);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        #cursor.pinching {
            background: #ff0077;
            box-shadow: 0 0 30px rgba(255, 0, 119, 0.8);
            transform: translate(-50%, -50%) scale(0.6);
        }
        #cursor.pinching::after {
            border-color: rgba(255, 0, 119, 0.5);
            animation: none;
            opacity: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 204, 0.2);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .instructions {
            opacity: 0.7;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading">
        <div class="spinner"></div>
        <h2>Initializing AI Simulation...</h2>
        <div class="instructions">Please allow camera access.</div>
    </div>

    <!-- Hand Tracking Feed -->
    <div class="video-container">
        <video class="input_video" autoplay playsinline></video>
        <canvas class="output_canvas" width="320" height="240"></canvas>
    </div>

    <!-- 3D Environment -->
    <div id="webgl-container"></div>

    <!-- UI Interaction Layer -->
    <div id="ui-layer">
        <div id="text-output-container">
            <textarea id="text-output" placeholder="Pinch fingers to type... Move hand left/right to walk 3D character." readonly></textarea>
        </div>

        <div id="keyboard">
            <div class="key-row">
                <div class="key" data-key="Q">Q</div><div class="key" data-key="W">W</div><div class="key" data-key="E">E</div><div class="key" data-key="R">R</div><div class="key" data-key="T">T</div><div class="key" data-key="Y">Y</div><div class="key" data-key="U">U</div><div class="key" data-key="I">I</div><div class="key" data-key="O">O</div><div class="key" data-key="P">P</div>
            </div>
            <div class="key-row">
                <div class="key" data-key="A">A</div><div class="key" data-key="S">S</div><div class="key" data-key="D">D</div><div class="key" data-key="F">F</div><div class="key" data-key="G">G</div><div class="key" data-key="H">H</div><div class="key" data-key="J">J</div><div class="key" data-key="K">K</div><div class="key" data-key="L">L</div>
            </div>
            <div class="key-row">
                <div class="key" data-key="Z">Z</div><div class="key" data-key="X">X</div><div class="key" data-key="C">C</div><div class="key" data-key="V">V</div><div class="key" data-key="B">B</div><div class="key" data-key="N">N</div><div class="key" data-key="M">M</div><div class="key backspace" data-key="Backspace">DEL</div>
            </div>
            <div class="key-row">
                <div class="key space" data-key=" ">SPACE</div>
            </div>
        </div>
        
        <div id="cursor"></div>
    </div>

    <!-- External Libraries -->
    <!-- MediaPipe Hands for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <!-- Three.js for 3D Character simulation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ----------------------------------------------------
        // 1. 3D Scene Setup (Walking Character)
        // ----------------------------------------------------
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0x00ffcc, 1);
        spotLight.position.set(0, 15, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        scene.add(spotLight);

        const backLight = new THREE.DirectionalLight(0xff0077, 0.8);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Environment Details (Grid floor)
        const gridHelper = new THREE.GridHelper(100, 50, 0x00ffcc, 0x111122);
        gridHelper.position.y = -2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);

        // Construct 3D Humanoid Character
        const personGroup = new THREE.Group();
        
        const mainMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x002211,
            emissive: 0x00ffcc,
            emissiveIntensity: 0.2,
            metalness: 0.8,
            roughness: 0.2
        });
        const darkMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x111111,
            metalness: 0.9,
            roughness: 0.5
        });

        // Torso
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.4, 0.8), mainMaterial);
        torso.position.y = 1.2;
        personGroup.add(torso);

        // Head
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 3, 0);
        const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mainMaterial);
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.1), new THREE.MeshBasicMaterial({ color: 0xff0077 }));
        visor.position.y = 0.1;
        headGroup.add(head);
        headGroup.add(visor);
        personGroup.add(headGroup);

        // Arms
        const armGeo = new THREE.BoxGeometry(0.5, 2, 0.5);
        
        const leftArmGroup = new THREE.Group();
        leftArmGroup.position.set(-1.1, 2.2, 0);
        const leftArm = new THREE.Mesh(armGeo, darkMaterial);
        leftArm.position.y = -1;
        leftArmGroup.add(leftArm);
        personGroup.add(leftArmGroup);

        const rightArmGroup = new THREE.Group();
        rightArmGroup.position.set(1.1, 2.2, 0);
        const rightArm = new THREE.Mesh(armGeo, darkMaterial);
        rightArm.position.y = -1;
        rightArmGroup.add(rightArm);
        personGroup.add(rightArmGroup);

        // Legs
        const legGeo = new THREE.BoxGeometry(0.6, 2.2, 0.6);
        
        const leftLegGroup = new THREE.Group();
        leftLegGroup.position.set(-0.4, 0, 0);
        const leftLeg = new THREE.Mesh(legGeo, darkMaterial);
        leftLeg.position.y = -1.1; // pivot down
        leftLegGroup.add(leftLeg);
        personGroup.add(leftLegGroup);

        const rightLegGroup = new THREE.Group();
        rightLegGroup.position.set(0.4, 0, 0);
        const rightLeg = new THREE.Mesh(legGeo, darkMaterial);
        rightLeg.position.y = -1.1;
        rightLegGroup.add(rightLeg);
        personGroup.add(rightLegGroup);

        scene.add(personGroup);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Character Variables
        let targetWorldX = 0;
        let walkCycle = 0;
        let isWalking = false;

        // ----------------------------------------------------
        // 2. Hand Tracking & Typing Logic
        // ----------------------------------------------------
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const cursor = document.getElementById('cursor');
        const keys = document.querySelectorAll('.key');
        const textOutput = document.getElementById('text-output');
        const loadingScreen = document.getElementById('loading');
        
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        let hoveredKey = null;
        let isPinching = false;
        let lastPinchTime = 0;
        const debounceMs = 400; // time before next key press allowed

        // MediaPipe Logic
        function onResults(results) {
            // Hide loading on first result
            if(loadingScreen.style.opacity !== "0") {
                loadingScreen.style.opacity = "0";
                setTimeout(() => loadingScreen.style.display = 'none', 500);
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Render skeleton on mini camera feed
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(0, 255, 204, 0.8)', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ff0077', lineWidth: 1, radius: 2});
                }

                // Extract landmarks of the primary hand
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];    // Index finger tip
                const thumbTip = hand[4];   // Thumb tip

                // Map Normalized coords to Window space
                // X reversed because camera feed is mirrored
                cursorX = (1 - indexTip.x) * window.innerWidth;
                cursorY = indexTip.y * window.innerHeight;

                // Move visual pointer
                cursor.style.left = `${cursorX}px`;
                cursor.style.top = `${cursorY}px`;

                // Calculate distance between thumb tip and index tip (Euclidean)
                const dx = indexTip.x - thumbTip.x;
                const dy = indexTip.y - thumbTip.y;
                const dz = indexTip.z - thumbTip.z;
                const pinchDistance = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                // Pinch detection threshold (experimentally good for mediapipe)
                const pinchThreshold = 0.05;

                // Detect Typing Pinch
                if (pinchDistance < pinchThreshold) {
                    if (!isPinching) {
                        isPinching = true;
                        cursor.classList.add('pinching');
                        
                        // Fire 'click' equivalent
                        const now = Date.now();
                        if (now - lastPinchTime > debounceMs) {
                            handleVirtualKeyPress();
                            lastPinchTime = now;
                        }
                    }
                } else {
                    if (isPinching) {
                        isPinching = false;
                        cursor.classList.remove('pinching');
                    }
                }
                
                // Update Hover States
                updateKeyHoverState(cursorX, cursorY);

                // --- Controlling 3D Character Walking ---
                // Map hand X position (0.0 - 1.0) to character X coordinate (-10 to 10)
                // We use mapped values: left edge = left walk, right edge = right walk
                const mappedX = ((1 - indexTip.x) - 0.5) * 20; 
                targetWorldX = mappedX;
                
            } else {
                // If hand lost, stop character and clear hovers
                targetWorldX = personGroup.position.x;
                clearHover();
            }
            canvasCtx.restore();
        }

        // Hit-test keys using cursor coords
        function updateKeyHoverState(x, y) {
            let hitTarget = null;
            keys.forEach(key => {
                const rect = key.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    hitTarget = key;
                }
            });

            if (hitTarget) {
                if (hoveredKey !== hitTarget) {
                    clearHover();
                    hoveredKey = hitTarget;
                    hoveredKey.classList.add('hover');
                }
            } else {
                clearHover();
            }
        }

        function clearHover() {
            if (hoveredKey) {
                hoveredKey.classList.remove('hover');
                hoveredKey = null;
            }
        }

        // Process final typing
        function handleVirtualKeyPress() {
            if (hoveredKey) {
                hoveredKey.classList.add('active');
                setTimeout(() => hoveredKey.classList.remove('active'), 150);

                const char = hoveredKey.getAttribute('data-key');
                if (char === 'Backspace') {
                    textOutput.value = textOutput.value.slice(0, -1);
                } else {
                    textOutput.value += char;
                }
                
                // Pulse text field container effect
                const container = document.getElementById('text-output-container');
                container.style.boxShadow = '0 0 40px rgba(0, 255, 204, 0.6)';
                container.style.borderColor = 'rgba(0, 255, 204, 0.8)';
                setTimeout(() => {
                    container.style.boxShadow = '0 20px 40px rgba(0,0,0,0.5)';
                    container.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                }, 200);
            }
        }

        // Initialize MediaPipe AI Hand Tracker
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 1, // Track single primary hand for simplicity
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        // Bind Camera Stream
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // ----------------------------------------------------
        // 3. Animation & Render Loop
        // ----------------------------------------------------
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Character movement interpolation (ease towards target)
            const diffX = targetWorldX - personGroup.position.x;
            personGroup.position.x += diffX * 0.08; 

            // Evaluate walking state (if distance > threshold)
            if (Math.abs(diffX) > 0.05) {
                // Calculate speed based on distance diff
                const speed = Math.abs(diffX) * 0.1 + 0.05;
                walkCycle += speed;

                // Face moving direction
                const targetRotY = diffX > 0 ? (Math.PI / 2) : (-Math.PI / 2);
                personGroup.rotation.y += (targetRotY - personGroup.rotation.y) * 0.15;

                // Animate Walking Kinematics
                // Legs swing oppositely
                leftLegGroup.rotation.x = Math.sin(walkCycle) * 0.8;
                rightLegGroup.rotation.x = -Math.sin(walkCycle) * 0.8;
                
                // Arms swing oppositely and contrary to legs
                leftArmGroup.rotation.x = -Math.sin(walkCycle) * 0.8;
                rightArmGroup.rotation.x = Math.sin(walkCycle) * 0.8;

                // Subtle torso bobbing
                personGroup.position.y = Math.abs(Math.sin(walkCycle * 2)) * 0.15;
                
            } else {
                // Interpolate back to idle (standing still facing forward)
                personGroup.rotation.y += (0 - personGroup.rotation.y) * 0.1;
                personGroup.position.y += (0 - personGroup.position.y) * 0.1;
                
                leftLegGroup.rotation.x += (0 - leftLegGroup.rotation.x) * 0.2;
                rightLegGroup.rotation.x += (0 - rightLegGroup.rotation.x) * 0.2;
                
                leftArmGroup.rotation.x += (0 - leftArmGroup.rotation.x) * 0.2;
                rightArmGroup.rotation.x += (0 - rightArmGroup.rotation.x) * 0.2;
            }

            // Pulse environment grid slightly
            gridHelper.material.opacity = 0.2 + (Math.sin(Date.now() * 0.002) * 0.1);

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
